<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULZ — Find Your Race</title>
    <meta name="description" content="All running and trail races in South America in one place. Find marathons, half marathons, trail runs and ultras across Argentina, Chile, Brasil, Uruguay, Colombia and Peru.">
    <meta name="keywords" content="running, races, marathon, trail, South America, carreras, maratón, corridas">
    <meta property="og:title" content="PULZ — Find Your Race">
    <meta property="og:description" content="All running and trail races in South America in one place.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0A0A0C">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- SPLASH -->
    <section class="splash" id="splash">
        <div class="splash-bg"></div>
        <div class="particles" id="particles"></div>
        <div class="splash-logo" id="splashLogo">
            <div class="splash-dot"></div>
            <span class="splash-text">PULZ</span>
        </div>
        <div class="splash-sub" data-i18n="heroLbl">110+ carreras · 6 países</div>
        <div class="scroll-cue" id="scrollCue">
            <span>scroll</span>
            <div class="scroll-cue-line"></div>
        </div>
    </section>

    <!-- HEADER -->
    <header id="mainHeader">
        <div class="logo" onclick="goHome()">
            <div class="logo-dot"></div>
            PULZ
        </div>
        <div class="hdr-r">
            <div class="lang-sw">
                <button class="lang-btn active" onclick="setLang('es')">ES</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
                <button class="lang-btn" onclick="setLang('pt')">PT</button>
            </div>
            <div class="hdr-tag" data-i18n="tag">Sudamérica 2026</div>
        </div>
    </header>

    <!-- HOME -->
    <section class="home" id="home">
        <div class="home-eyebrow" data-i18n="tag">Sudamérica 2026</div>
        <h1 class="hero-q">
            <span class="hl" data-i18n="heroH1">Encontrá tu</span>
            <span data-i18n="heroH2">carrera.</span>
        </h1>
        <p class="hero-sub" data-i18n="heroSub">Todas las carreras de running y trail de Sudamérica en un solo lugar.</p>
        <div class="cs">
            <div class="cs-trigger" id="csTrigger" onclick="toggleDD()">
                <div class="cs-icon">↓</div>
                <div class="cs-label" data-i18n="selC">Elegí un país</div>
                <div class="cs-arrow"><svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg></div>
            </div>
            <div class="dd" id="dd"></div>
        </div>
    </section>

    <!-- COUNTRY CONTENT (inline, rendered by JS) -->
    <div class="section-line" id="sectionLine" style="display:none"></div>
    <div class="country-content" id="countryContent"></div>

    <!-- FOOTER -->
    <footer>
        <div class="ft-logo"><div class="ft-dot"></div>PULZ</div>
        <div class="ft-info">© 2026 · <span data-i18n="ftxt">Carreras de running Sudamérica</span></div>
    </footer>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
