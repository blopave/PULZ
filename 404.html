<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULZ — Página no encontrada</title>
    <meta name="description" content="La página que buscás no existe. Volvé al calendario de carreras de running y trail de Sudamérica.">
    <meta name="robots" content="noindex,follow">
    <meta name="theme-color" content="#0A0A0C">
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        *{cursor:auto !important}
        .error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
        .error-code{font-family:'Bebas Neue',sans-serif;font-size:clamp(6rem,15vw,10rem);letter-spacing:0.05em;line-height:1;color:var(--pulse);margin-bottom:0.5rem}
        .error-title{font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:600;color:var(--txt);margin-bottom:0.5rem}
        .error-sub{font-size:0.85rem;color:var(--txt2);margin-bottom:2rem;max-width:360px;line-height:1.6}
        .error-btn{display:inline-flex;align-items:center;gap:0.4rem;background:var(--pulse);color:var(--bg);padding:0.7rem 1.6rem;border-radius:100px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:700;text-decoration:none;transition:opacity 0.2s}
        .error-btn:hover{opacity:0.9}
        .error-btn svg{width:16px;height:16px}
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Esta carrera no existe</h1>
        <p class="error-sub">La página que buscás no fue encontrada. Puede que haya cambiado de lugar o ya no exista.</p>
        <a href="/" class="error-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Volver a PULZ
        </a>
    </div>
</body>
</html>
